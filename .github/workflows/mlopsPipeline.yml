name: MLops Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
    data-processing:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v6
            - name: set up python
              uses: actions/setup-python@v6
              with:
                python-version: '3.11.5'
            - name: install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt
            - name: Data preprocessing
              run: |
                python src/data/run_processing.py   --input data/raw/house_data.csv   --output data/processed/cleaned_house_data.csv
            - name: Feature Engineering
              run: |
                python src/features/engineer.py   --input data/processed/cleaned_house_data.csv   --output data/processed/featured_house_data.csv   --preprocessor models/trained/preprocessor.pkl
            - name: Upload processed data
              uses: actions/upload-artifact@v4
              with:
                name: processed-data
                path: data/processed/featured_house_data.csv
            - name: Upload preprocessor
              uses: actions/upload-artifact@v4
              with:
                name: preprocessor
                path: models/trained/preprocessor.pkl
    model-training:
        runs-on: ubuntu-latest
        needs: data-processing
        steps:
            - name: checkout code
              uses: actions/checkout@v6
            - name: set up python
              uses: actions/setup-python@v6
              with:
                python-version: '3.11.5'
            - name: install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt
            - name: Download processed data
              uses: actions/download-artifact@v4
              with:
                name: processed-data
                path: data/processed/
            - name: Setup MLflow server
              run: |
                docker compose -f deployment/mlflow/docker-compose.yaml up -d
            - name: Wait for MLflow server to be ready
              run: |
                for i in {1..10}; do
                    if curl -s http://localhost:5555/ > /dev/null; then
                        echo "MLflow server is up!"
                        break
                    else
                        echo "Waiting for MLflow server to be ready..."
                        sleep 5
                    fi
                done
            - name: Model training
              run: |
                mkdir -p models
                python src/models/train_model.py --config configs/model_config.yaml --data data/processed/featured_house_data.csv --models-dir models --mlflow-tracking-uri http://localhost:5555
            - name: upload trained model
              uses: actions/upload-artifact@v4
              with:
                name: trained-model
                path: models/
            - name: Clean up MLflow server
              run: |
                docker compose -f deployment/mlflow/docker-compose.yaml down
                docker rmi ghcr.io/mlflow/mlflow:latest
    build-and-publish:
        runs-on: ubuntu-latest
        needs: model-training
        steps:
            - name: checkout code
              uses: actions/checkout@v6
            - name: Download trained model
              uses: actions/download-artifact@v4
              with:
                name: trained-model
                path: models/
            - name: Download preprocessor
              uses: actions/download-artifact@v4
              with:
                name: preprocessor
                path: models/trained/
            - name: Setup Docker Buildx
              uses: docker/setup-buildx-action@v4
            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                registry: docker.io
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Set short SHA for tagging
              run: echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)"
            - name: Build and push Docker image
              uses: docker/build-push-action@v7
              with:
                push: true
                tags: ${{ vars.DOCKERHUB_USERNAME }}/house-price-model:${{ env.SHORT_SHA }}
                context: .
                file: dockerfile